name: mediconnect_pro
description: "MediConnect Pro - Application mobile de santé conforme RGPD"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── UI & Design ──────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  flutter_spinkit: ^5.2.1

  # ── State Management (Riverpod) ────────────────────────────
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # ── Navigation ───────────────────────────────────────────
  go_router: ^14.6.2

  # ── HTTP Client ──────────────────────────────────────────
  dio: ^5.7.0

  # ── Local DB sécurisée (Drift + SQLCipher) ───────────────
  drift: ^2.22.1
  sqlcipher_flutter_libs: ^0.6.7

  # ── Stockage sécurisé ───────────────────────────────────
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.3

  # ── WebSocket (Laravel Echo) ─────────────────────────────
  socket_io_client: ^3.0.2

  # ── WebRTC ───────────────────────────────────────────────
  flutter_webrtc: ^1.3.1

  # ── Notifications ────────────────────────────────────────
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # ── Chiffrement E2E ──────────────────────────────────────
  pointycastle: ^3.9.1
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # ── Utilitaires ──────────────────────────────────────────
  intl: any
  connectivity_plus: ^6.1.1
  permission_handler: ^11.3.1
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  path: ^1.9.1
  uuid: ^4.5.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  logger: ^2.5.0
  internet_connection_checker_plus: ^2.5.2
  table_calendar: ^3.1.3
  flutter_slidable: ^3.1.1
  pull_to_refresh_flutter3: ^2.0.2
  infinite_scroll_pagination: ^4.1.0
  flutter_rating_bar: ^4.0.1
  local_auth: ^2.3.0

  # ── Biometric ────────────────────────────────────────────
  # local_auth already listed above

  sqlite3: any
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  flutter_live_activities: ^0.0.5
  pusher_channels_flutter: ^2.4.0
  web_socket_channel: ^3.0.3
  flutter_bloc: ^9.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Code Generation (Drift only) ────────────────────────────
  build_runner: ^2.4.13
  drift_dev: ^2.22.1

  # ── Testing ────────────────────────────────────────────────
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
