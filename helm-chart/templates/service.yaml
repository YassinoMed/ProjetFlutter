apiVersion: v1
kind: Service
metadata:
  name: {{ include "mediconnect.fullname" . }}-api
  labels:
    app: {{ include "mediconnect.fullname" . }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 8081
      targetPort: reverb
      protocol: TCP
      name: reverb
  selector:
    app: {{ include "mediconnect.fullname" . }}
