# Global variables
environment: "dev"

# Image configuration
image:
  repository: ghcr.io/yassinomed/mediconnect-api
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: docker-registry-credentials

# API deployment
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Env vars map
env:
  APP_DEBUG: "true"
  LOG_CHANNEL: "stack"
  DB_CONNECTION: "pgsql"

# Ingress
ingress:
  enabled: true
  className: "nginx"
  hostname: api-dev.mediconnect.local
  tls:
    enabled: true
    secretName: mediconnect-tls-secret

# Auto-scaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# PostgreSQL Bitnami Chart Config
postgresql:
  enabled: true
  auth:
    postgresPassword: "replace-via-secret-manager"
    username: "mediconnect"
    password: "replace-via-secret-manager"
    database: "mediconnect"
  primary:
    persistence:
      size: 5Gi
