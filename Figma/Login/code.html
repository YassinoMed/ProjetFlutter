<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MediConnect Pro - Connexion V2.0</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Roboto:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-fixed-dim": "#a8c8ff",
                        "on-tertiary-container": "#84ff96",
                        "tertiary": "#005c22",
                        "primary-container": "#0a66c2",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed": "#001b3c",
                        "on-primary-fixed-variant": "#00468a",
                        "inverse-primary": "#a8c8ff",
                        "on-primary-container": "#dbe6ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#31476a",
                        "inverse-on-surface": "#eff1f6",
                        "on-surface": "#181c20",
                        "on-error-container": "#93000a",
                        "outline": "#727783",
                        "surface-dim": "#d8dadf",
                        "surface-container-highest": "#e0e2e7",
                        "secondary-fixed": "#d6e3ff",
                        "inverse-surface": "#2d3135",
                        "tertiary-fixed": "#69ff87",
                        "on-surface-variant": "#414752",
                        "surface-container": "#eceef3",
                        "on-tertiary-fixed-variant": "#00531e",
                        "surface-container-high": "#e6e8ed",
                        "on-tertiary-fixed": "#002108",
                        "surface-bright": "#f7f9fe",
                        "on-background": "#181c20",
                        "error": "#ba1a1a",
                        "surface-tint": "#005eb5",
                        "primary-fixed": "#d6e3ff",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c1c6d4",
                        "tertiary-fixed-dim": "#3ce36a",
                        "secondary-container": "#bfd5ff",
                        "secondary": "#495f83",
                        "on-error": "#ffffff",
                        "background": "#f7f9fe",
                        "surface-container-low": "#f1f4f9",
                        "surface": "#f7f9fe",
                        "on-secondary-container": "#465c80",
                        "on-primary-fixed": "#001b3d",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#b1c7f1",
                        "tertiary-container": "#00772e",
                        "surface-variant": "#e0e2e7",
                        "primary": "#004e99"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Roboto"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container font-body text-on-surface antialiased m-0 p-0 overflow-hidden">
<!-- Main Viewport Split -->
<div class="flex h-screen w-full overflow-hidden">
<!-- LIGHT MODE SECTION -->
<section class="w-1/2 h-full bg-surface relative flex flex-col items-center justify-center p-8 border-r border-outline-variant/30">
<!-- Background Decoration (Light) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary-container/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-secondary-container/20 rounded-full blur-[80px]"></div>
</div>
<!-- Login Container (Light) -->
<div class="w-full max-w-[400px] z-10 flex flex-col space-y-8">
<!-- Logo & Brand Header -->
<div class="flex flex-col items-center text-center">
<div class="w-16 h-16 bg-surface-container-lowest rounded-full shadow-lg shadow-primary/5 flex items-center justify-center mb-6 border border-outline-variant/20">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-inner">
<span class="text-primary font-black text-2xl tracking-tighter">M+</span>
</div>
</div>
<h1 class="font-headline font-black text-[3.5rem] leading-none tracking-tighter text-on-surface mb-2">Bienvenue</h1>
<p class="font-headline font-medium text-sm uppercase tracking-widest text-on-surface-variant/70">Accès sécurisé praticien</p>
</div>
<!-- Input Group -->
<div class="space-y-4">
<div class="space-y-1.5">
<label class="font-headline text-xs font-bold text-on-surface-variant ml-1">Email Professionnel</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-none rounded-[16px] text-on-surface focus:ring-2 focus:ring-primary/20 transition-all font-body" placeholder="nom@etablissement.fr" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="font-headline text-xs font-bold text-on-surface-variant ml-1">Mot de Passe</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-none rounded-[16px] text-on-surface focus:ring-2 focus:ring-primary/20 transition-all font-body" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-outline cursor-pointer hover:text-primary">visibility</span>
</div>
</div>
<div class="flex justify-end">
<a class="text-xs font-headline font-bold text-primary hover:underline" href="#">Mot de passe oublié ?</a>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-3">
<button class="w-full h-14 bg-primary text-on-primary rounded-[16px] font-headline font-bold text-lg shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center">
                        Se connecter
                    </button>
<button class="w-full h-14 bg-surface-container-highest text-on-surface rounded-[16px] font-headline font-semibold text-sm hover:bg-surface-variant transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">face</span>
                        Continuer avec FaceID
                    </button>
</div>
<!-- Security Badge -->
<div class="flex justify-center mt-4">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-tertiary-container/10 rounded-full border border-tertiary-container/20">
<span class="material-symbols-outlined text-tertiary text-[18px]" style="font-variation-settings: 'FILL' 1;">enhanced_encryption</span>
<span class="font-headline text-[10px] font-bold text-tertiary uppercase tracking-wider">Chiffrement E2E Actif</span>
</div>
</div>
</div>
<!-- Version Tag -->
<div class="absolute bottom-6 left-8">
<span class="font-headline text-[10px] font-black text-outline/40">V2.0 STABLE</span>
</div>
</section>
<!-- DARK MODE SECTION -->
<section class="w-1/2 h-full bg-on-primary-fixed relative flex flex-col items-center justify-center p-8 overflow-hidden dark">
<!-- Background Decoration (Dark) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[20%] left-[-10%] w-[500px] h-[500px] bg-primary/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[350px] h-[350px] bg-tertiary/10 rounded-full blur-[90px]"></div>
</div>
<!-- Login Container (Dark) -->
<div class="w-full max-w-[400px] z-10 flex flex-col space-y-8">
<!-- Logo & Brand Header -->
<div class="flex flex-col items-center text-center">
<div class="w-16 h-16 bg-white/5 backdrop-blur-md rounded-full flex items-center justify-center mb-6 border border-white/10 shadow-2xl">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center">
<span class="text-primary font-black text-2xl tracking-tighter">M+</span>
</div>
</div>
<h1 class="font-headline font-black text-[3.5rem] leading-none tracking-tighter text-white mb-2">Bienvenue</h1>
<p class="font-headline font-medium text-sm uppercase tracking-widest text-primary-fixed-dim/70">Accès sécurisé praticien</p>
</div>
<!-- Input Group -->
<div class="space-y-4">
<div class="space-y-1.5">
<label class="font-headline text-xs font-bold text-primary-fixed-dim/60 ml-1">Email Professionnel</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-primary-fixed-dim/50">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-white/5 border border-white/10 rounded-[16px] text-white placeholder:text-white/20 focus:ring-2 focus:ring-primary-fixed-dim/30 transition-all font-body" placeholder="nom@etablissement.fr" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="font-headline text-xs font-bold text-primary-fixed-dim/60 ml-1">Mot de Passe</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-primary-fixed-dim/50">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-white/5 border border-white/10 rounded-[16px] text-white placeholder:text-white/20 focus:ring-2 focus:ring-primary-fixed-dim/30 transition-all font-body" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-primary-fixed-dim/50 cursor-pointer hover:text-white">visibility</span>
</div>
</div>
<div class="flex justify-end">
<a class="text-xs font-headline font-bold text-primary-fixed-dim hover:text-white transition-colors" href="#">Mot de passe oublié ?</a>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-3">
<button class="w-full h-14 bg-primary text-on-primary rounded-[16px] font-headline font-bold text-lg shadow-2xl shadow-black/40 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center">
                        Se connecter
                    </button>
<button class="w-full h-14 bg-white/5 text-white border border-white/10 rounded-[16px] font-headline font-semibold text-sm hover:bg-white/10 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">fingerprint</span>
                        Continuer par biométrie
                    </button>
</div>
<!-- Security Badge -->
<div class="flex justify-center mt-4">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-tertiary-fixed/10 rounded-full border border-tertiary-fixed/20">
<span class="material-symbols-outlined text-tertiary-fixed-dim text-[18px]" style="font-variation-settings: 'FILL' 1;">enhanced_encryption</span>
<span class="font-headline text-[10px] font-bold text-tertiary-fixed-dim uppercase tracking-wider">Chiffrement E2E Actif</span>
</div>
</div>
</div>
<!-- Theme Toggle Indicator (Decorative) -->
<div class="absolute top-6 right-8 flex items-center gap-2">
<span class="material-symbols-outlined text-primary-fixed-dim text-xl" style="font-variation-settings: 'FILL' 1;">dark_mode</span>
</div>
<!-- Version Tag -->
<div class="absolute bottom-6 right-8">
<span class="font-headline text-[10px] font-black text-white/20">V2.0 STABLE</span>
</div>
</section>
</div>
<!-- UI Interaction Hints (Floating) -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-50">
<div class="h-[600px] w-[1px] bg-gradient-to-b from-transparent via-outline-variant/50 to-transparent"></div>
</div>
</body></html>
