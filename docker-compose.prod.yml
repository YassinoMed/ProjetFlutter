x-laravel-env: &laravel-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: ${APP_URL}
  APP_TIMEZONE: UTC
  LOG_CHANNEL: stack
  LOG_STACK: json_stderr,security
  LOG_LEVEL: info
  DB_CONNECTION: ${DB_CONNECTION:-pgsql}
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_SSLMODE: ${DB_SSLMODE:-require}
  REDIS_CLIENT: phpredis
  REDIS_HOST: ${REDIS_HOST}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: ${REVERB_APP_ID}
  REVERB_APP_KEY: ${REVERB_APP_KEY}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET}
  REVERB_HOST: ${REVERB_HOST:-ws.mediconnect.example}
  REVERB_PORT: ${REVERB_PORT:-443}
  REVERB_SCHEME: ${REVERB_SCHEME:-https}
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: 8080
  REVERB_ALLOWED_ORIGINS: ${REVERB_ALLOWED_ORIGINS}
  MAIL_MAILER: ${MAIL_MAILER:-smtp}
  MAIL_HOST: ${MAIL_HOST}
  MAIL_PORT: ${MAIL_PORT:-587}
  MAIL_USERNAME: ${MAIL_USERNAME}
  MAIL_PASSWORD: ${MAIL_PASSWORD}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-s3}
  DOCUMENTS_DISK: ${DOCUMENTS_DISK:-s3}
  DOCUMENTS_AI_DRIVER: ${DOCUMENTS_AI_DRIVER:-heuristic}
  DOCUMENTS_DOCUMENT_CHAT_DRIVER: ${DOCUMENTS_DOCUMENT_CHAT_DRIVER:-heuristic}
  DOCUMENTS_AI_PROVIDER: ${DOCUMENTS_AI_PROVIDER:-medical_api}
  DOCUMENTS_AI_BASE_URL: ${DOCUMENTS_AI_BASE_URL:-}
  DOCUMENTS_AI_API_KEY: ${DOCUMENTS_AI_API_KEY:-}
  DOCUMENTS_AI_MODEL: ${DOCUMENTS_AI_MODEL:-II-Medical-8B}
  DOCUMENTS_AI_GENERATE_PATH: ${DOCUMENTS_AI_GENERATE_PATH:-/generate}
  DOCUMENTS_AI_CHAT_PATH: ${DOCUMENTS_AI_CHAT_PATH:-/chat}
  DOCUMENTS_AI_TIMEOUT_SECONDS: ${DOCUMENTS_AI_TIMEOUT_SECONDS:-45}
  DOCUMENTS_AI_MAX_NEW_TOKENS: ${DOCUMENTS_AI_MAX_NEW_TOKENS:-1024}
  DOCUMENTS_AI_TEMPERATURE: ${DOCUMENTS_AI_TEMPERATURE:-0}
  DOCUMENTS_AI_TOP_P: ${DOCUMENTS_AI_TOP_P:-0.9}
  DOCUMENTS_AI_REPETITION_PENALTY: ${DOCUMENTS_AI_REPETITION_PENALTY:-1.1}
  DOCUMENTS_AI_PROMPT_TEXT_MAX_CHARS: ${DOCUMENTS_AI_PROMPT_TEXT_MAX_CHARS:-2600}
  OTEL_ENABLED: ${OTEL_ENABLED:-true}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
  METRICS_ENABLED: ${METRICS_ENABLED:-true}
  METRICS_TOKEN: ${METRICS_TOKEN}
  METRICS_REDIS_CONNECTION: ${METRICS_REDIS_CONNECTION:-cache}
  METRICS_QUEUE_NAMES: ${METRICS_QUEUE_NAMES:-default}
  COTURN_STUN_URLS: ${COTURN_STUN_URLS}
  COTURN_TURN_URLS: ${COTURN_TURN_URLS}
  COTURN_SHARED_SECRET: ${COTURN_SHARED_SECRET}
  CACHE_LARAVEL_BOOTSTRAP: "true"
  TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}

x-laravel-service: &laravel-service
  image: ${BACKEND_IMAGE:-ghcr.io/example/mediconnect-api}:${BACKEND_IMAGE_TAG:-latest}
  restart: unless-stopped
  working_dir: /var/www/html
  environment:
    <<: *laravel-env
  volumes:
    - app_storage:/var/www/html/storage/app
    - app_logs:/var/www/html/storage/logs
  networks:
    - mediconnect

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      reverb:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - app_public:/var/www/html/public:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mediconnect

  app:
    <<: *laravel-service
    command: ["php-fpm", "-F"]
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  queue:
    <<: *laravel-service
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120", "--sleep=3"]

  scheduler:
    <<: *laravel-service
    command: ["php", "artisan", "schedule:work"]

  reverb:
    <<: *laravel-service
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${REVERB_SERVER_PORT_FORWARD:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 8080); exit($$socket ? 0 : 1);'"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    command:
      - --listening-port=3478
      - --tls-listening-port=5349
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${COTURN_SHARED_SECRET:?COTURN_SHARED_SECRET is required}
      - --realm=${COTURN_REALM:-teleconsultation.mediconnect.local}
      - --server-name=MediConnect TURN
      - --total-quota=100
      - --stale-nonce=600
      - --no-multicast-peers
      - --no-cli
      - --no-loopback-peers
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - mediconnect

  migrate:
    <<: *laravel-service
    command: ["php", "artisan", "migrate", "--force"]
    restart: "no"
    profiles: ["ops"]

volumes:
  app_public:
  app_storage:
  app_logs:

networks:
  mediconnect:
    name: mediconnect
