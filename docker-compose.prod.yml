services:
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:80"
    depends_on:
      - app
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-mediconnect}
      DB_USERNAME: ${DB_USERNAME:-mediconnect}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-mediconnect}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-mediconnect-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-mediconnect-secret}
      REVERB_HOST: 127.0.0.1
      REVERB_PORT: 8081
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
      MEDICONNECT_PRESENCE_FRESHNESS_SECONDS: ${MEDICONNECT_PRESENCE_FRESHNESS_SECONDS:-90}
      MEDICONNECT_MESSAGE_RETENTION_DAYS: ${MEDICONNECT_MESSAGE_RETENTION_DAYS:-730}
      MEDICONNECT_CALL_RING_TIMEOUT_SECONDS: ${MEDICONNECT_CALL_RING_TIMEOUT_SECONDS:-45}
      COTURN_STUN_URLS: ${COTURN_STUN_URLS:-stun:stun.l.google.com:19302}
      COTURN_TURN_URLS: ${COTURN_TURN_URLS:-turn:coturn:3478?transport=udp,turn:coturn:3478?transport=tcp}
    depends_on:
      - postgres
      - redis
    ports:
      - "${REVERB_PORT_FORWARD:-8081}:8081"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mediconnect}
      POSTGRES_USER: ${DB_USERNAME:-mediconnect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
