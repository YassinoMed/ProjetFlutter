services:
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - app
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mediconnect}
      DB_USERNAME: ${DB_USERNAME:-mediconnect}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      BROADCAST_CONNECTION: pusher
      PUSHER_APP_ID: ${PUSHER_APP_ID:-local}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY:-local}
      PUSHER_APP_SECRET: ${PUSHER_APP_SECRET:-local}
      PUSHER_HOST: app
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      PUSHER_USE_TLS: "false"
      WEBSOCKETS_PORT: 6001
      WEBSOCKETS_PATH: /app
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-mediconnect}
      MYSQL_USER: ${DB_USERNAME:-mediconnect}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
