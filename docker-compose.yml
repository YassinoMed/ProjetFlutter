services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - app
    volumes:
      - ./backend:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html:delegated
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8080}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-mediconnect}
      DB_USERNAME: ${DB_USERNAME:-mediconnect}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      # ── Reverb (replaces deprecated beyondcode/laravel-websockets) ──
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: mediconnect
      REVERB_APP_KEY: mediconnect-key
      REVERB_APP_SECRET: mediconnect-secret
      REVERB_HOST: app
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      # ── OpenTelemetry ──
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: mediconnect-api
      # ── RGPD Data Minimization ──
      CHAT_MESSAGE_TTL_DAYS: 730
      MEDICAL_RECORD_TTL_DAYS: 3650
    depends_on:
      - mysql
      - redis
      - mailpit

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_PORT_FORWARD:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-mediconnect}
      MYSQL_USER: ${DB_USERNAME:-mediconnect}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: UTC
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis_data:/data

  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      - mysql

  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "${MAILPIT_SMTP_PORT_FORWARD:-1025}:1025"
      - "${MAILPIT_UI_PORT_FORWARD:-8025}:8025"

volumes:
  mysql_data:
  redis_data:
