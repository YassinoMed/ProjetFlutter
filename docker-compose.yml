x-laravel-env: &laravel-env
  APP_ENV: local
  APP_DEBUG: "true"
  APP_URL: http://localhost:${APP_PORT:-8089}
  APP_TIMEZONE: UTC
  LOG_CHANNEL: stack
  LOG_STACK: stderr,security
  LOG_LEVEL: debug
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-mediconnect}
  DB_USERNAME: ${DB_USERNAME:-mediconnect}
  DB_PASSWORD: ${DB_PASSWORD:-secret}
  DB_SSLMODE: disable
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-secret}
  REDIS_DB: 0
  REDIS_CACHE_DB: 1
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  BROADCAST_CONNECTION: reverb
  REVERB_APP_ID: ${REVERB_APP_ID:-mediconnect}
  REVERB_APP_KEY: ${REVERB_APP_KEY:-mediconnect-key}
  REVERB_APP_SECRET: ${REVERB_APP_SECRET:-mediconnect-secret}
  REVERB_HOST: localhost
  REVERB_PORT: ${REVERB_PORT_FORWARD:-8081}
  REVERB_SCHEME: http
  REVERB_SERVER_HOST: 0.0.0.0
  REVERB_SERVER_PORT: 8080
  REVERB_ALLOWED_ORIGINS: http://localhost:${APP_PORT:-8089},http://127.0.0.1:${APP_PORT:-8089}
  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: 1025
  FILESYSTEM_DISK: local
  DOCUMENTS_DISK: local
  DOCUMENTS_AI_DRIVER: ${DOCUMENTS_AI_DRIVER:-heuristic}
  DOCUMENTS_DOCUMENT_CHAT_DRIVER: ${DOCUMENTS_DOCUMENT_CHAT_DRIVER:-heuristic}
  DOCUMENTS_AI_PROVIDER: ${DOCUMENTS_AI_PROVIDER:-medical_api}
  DOCUMENTS_AI_BASE_URL: ${DOCUMENTS_AI_BASE_URL:-}
  DOCUMENTS_AI_API_KEY: ${DOCUMENTS_AI_API_KEY:-}
  DOCUMENTS_AI_MODEL: ${DOCUMENTS_AI_MODEL:-II-Medical-8B}
  DOCUMENTS_AI_GENERATE_PATH: ${DOCUMENTS_AI_GENERATE_PATH:-/generate}
  DOCUMENTS_AI_CHAT_PATH: ${DOCUMENTS_AI_CHAT_PATH:-/chat}
  DOCUMENTS_AI_TIMEOUT_SECONDS: ${DOCUMENTS_AI_TIMEOUT_SECONDS:-45}
  DOCUMENTS_AI_MAX_NEW_TOKENS: ${DOCUMENTS_AI_MAX_NEW_TOKENS:-1024}
  DOCUMENTS_AI_TEMPERATURE: ${DOCUMENTS_AI_TEMPERATURE:-0}
  DOCUMENTS_AI_TOP_P: ${DOCUMENTS_AI_TOP_P:-0.9}
  DOCUMENTS_AI_REPETITION_PENALTY: ${DOCUMENTS_AI_REPETITION_PENALTY:-1.1}
  DOCUMENTS_AI_PROMPT_TEXT_MAX_CHARS: ${DOCUMENTS_AI_PROMPT_TEXT_MAX_CHARS:-2600}
  OTEL_ENABLED: "false"
  METRICS_ENABLED: "true"
  METRICS_TOKEN: ${METRICS_TOKEN:-change-me-metrics-token}
  METRICS_REDIS_CONNECTION: cache
  METRICS_QUEUE_NAMES: ${METRICS_QUEUE_NAMES:-default}
  COTURN_STUN_URLS: ${COTURN_STUN_URLS:-stun:stun.l.google.com:19302}
  COTURN_TURN_URLS: ${COTURN_TURN_URLS:-turn:localhost:3478?transport=udp,turn:localhost:3478?transport=tcp}
  COTURN_SHARED_SECRET: ${COTURN_SHARED_SECRET:-change-me-turn-secret}

x-laravel-service: &laravel-service
  build:
    context: .
    dockerfile: backend/Dockerfile
  restart: unless-stopped
  working_dir: /var/www/html
  environment:
    <<: *laravel-env
  volumes:
    - ./backend:/var/www/html
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - mediconnect

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      reverb:
        condition: service_started
    ports:
      - "${APP_PORT:-8089}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mediconnect

  app:
    <<: *laravel-service
    command: ["php-fpm", "-F"]
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  queue:
    <<: *laravel-service
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120", "--sleep=3"]

  scheduler:
    <<: *laravel-service
    command: ["php", "artisan", "schedule:work"]

  reverb:
    <<: *laravel-service
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "${REVERB_PORT_FORWARD:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$socket = @fsockopen(\"127.0.0.1\", 8080); exit($$socket ? 0 : 1);'"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${DB_PORT_FORWARD:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mediconnect}
      POSTGRES_USER: ${DB_USERNAME:-mediconnect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: UTC
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-mediconnect} -d ${DB_DATABASE:-mediconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mediconnect

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis-secret}"]
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis-secret} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - mediconnect

  mailpit:
    image: axllent/mailpit:v1.24
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT_FORWARD:-1025}:1025"
      - "${MAILPIT_UI_PORT_FORWARD:-8025}:8025"
    networks:
      - mediconnect

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    command:
      - --listening-port=3478
      - --tls-listening-port=5349
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${COTURN_SHARED_SECRET:-change-me-turn-secret}
      - --realm=${COTURN_REALM:-teleconsultation.mediconnect.local}
      - --server-name=MediConnect TURN
      - --total-quota=100
      - --stale-nonce=600
      - --no-multicast-peers
      - --no-cli
      - --no-loopback-peers
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49160-49200:49160-49200/udp"
    networks:
      - mediconnect

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - mediconnect

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  mediconnect:
    name: mediconnect
