services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - app
    volumes:
      - ./backend:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/html:delegated
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8080}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-mediconnect}
      DB_USERNAME: ${DB_USERNAME:-mediconnect}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      # ── Reverb (replaces deprecated beyondcode/laravel-websockets) ──
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: mediconnect
      REVERB_APP_KEY: mediconnect-key
      REVERB_APP_SECRET: mediconnect-secret
      REVERB_HOST: 127.0.0.1
      REVERB_PORT: 8081
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8081
      MEDICONNECT_PRESENCE_FRESHNESS_SECONDS: 90
      MEDICONNECT_MESSAGE_RETENTION_DAYS: 730
      MEDICONNECT_CALL_RING_TIMEOUT_SECONDS: 45
      COTURN_STUN_URLS: ${COTURN_STUN_URLS:-stun:stun.l.google.com:19302}
      COTURN_TURN_URLS: ${COTURN_TURN_URLS:-turn:coturn:3478?transport=udp,turn:coturn:3478?transport=tcp}
      # ── OpenTelemetry ──
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: mediconnect-api
      # ── RGPD Data Minimization ──
      CHAT_MESSAGE_TTL_DAYS: 730
      MEDICAL_RECORD_TTL_DAYS: 3650
    depends_on:
      - postgres
      - redis
      - mailpit
    ports:
      - "${REVERB_PORT_FORWARD:-8081}:8081"

  postgres:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT_FORWARD:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mediconnect}
      POSTGRES_USER: ${DB_USERNAME:-mediconnect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer:4
    ports:
      - "${ADMINER_PORT:-8082}:8080"
    depends_on:
      - postgres

  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "${MAILPIT_SMTP_PORT_FORWARD:-1025}:1025"
      - "${MAILPIT_UI_PORT_FORWARD:-8025}:8025"

volumes:
  postgres_data:
  redis_data:
