global:
  resolve_timeout: 5m

# Non-sensitive repository defaults only.
# Staging/production SMTP settings must be injected outside the repository.

route:
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: ops-email
  routes:
    - matchers:
        - severity="critical"
      receiver: ops-email

receivers:
  - name: ops-email
    email_configs:
      - to: ops@example.invalid
        from: alertmanager@example.invalid
        smarthost: smtp.example.invalid:587
        auth_username: alertmanager@example.invalid
        auth_password: replace-via-secret-manager
        require_tls: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["service", "alertname"]
