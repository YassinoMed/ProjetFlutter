name: mediconnect-github-actions-standby

on:
  workflow_dispatch:

jobs:
  jenkins-source-of-truth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Jenkins is the official CI/CD pipeline
        run: |
          echo "GitHub Actions is in standby mode for backend/platform delivery."
          echo "Jenkins is the single source of truth for lint, tests, security scans, image build, registry push and deployments."
          echo "Official pipeline file: Jenkinsfile"
